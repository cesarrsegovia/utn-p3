<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript" src="js/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="js/notas.js"></script>
    <title>Notas</title>
</head>
<body>
    <h1>Estado del alumno</h1> 
    <table border="2">
        <tr>
            <td>Ingresar nota 1: </td>
            <td><input type="text" id="nota1"></td>
        </tr>
        <tr>
            <td>Ingresar nota 2: </td>
            <td><input type="text" id="nota2"></td>
        </tr>
        <tr>
            <td>% Asistencia:</td>
            <td>
                <select name="" id="asistencia">
                    <option value="0">0</option>
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="40">40</option>
                    <option value="50">50</option>
                    <option value="60">60</option>
                    <option value="70">70</option>
                    <option value="80">80</option>
                    <option value="90">90</option>
                    <option value="100">100</option>
                </select>
            </td>
        </tr>
        
    </table>
    <div style="margin-top: 10px;">
        <button id="boton">Estado</button>
        <input type="text" id="estado" readonly style="border: none;">
    </div>
    <button id="reset">Reset</button>
</body>
</html>
