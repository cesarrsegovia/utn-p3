<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <script type="text/javascript" src="js/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="js/calculadora.js"></script>
</head>
<body>
    <h1>Calculadora</h1>
    <table>
        <tr>
            <td><label for="numero1">Número 1: </label>
                <input type="text" id="num1">
            </td>
            <td>
                <label for="numero2">Número 2: </label>
                <input type="text" id="num2">
            </td>
        </tr>
        <tr>
            <td><img src="img/suma.png" alt="suma" width="100" height="100" id="suma"></td>
            <td><img src="img/resta.png" alt="resta" width="100" height="100" id="resta"></td>
        </tr>
        <tr>
            <td><img src="img/multi.jpg" alt="multiplicación" width="100" height="100" id="multiplicacion"></td>
            <td><img src="img/division.png" alt="división" width="100" height="100" id="division"></td>
        </tr>
        <tr>
            <td><label>Resultado:</label>
                <input type="number" id="resultado" disabled>
            </td>
            <td><img src="img/basura.png" alt="eliminar" width="100" height="100" id="eliminar"></td>
        </tr>
    </table>
</body>
</html>
